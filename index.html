<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Férias Mari 🌴</title>
  <style>
    :root {
      --orange: #FF6B35;
      --orange-light: #FFF0EA;
      --orange-glow: #FF6B3533;
      --dark: #1A1A2E;
      --mid: #2D2D44;
      --card: #242438;
      --border: #3A3A55;
      --text: #E8E8F0;
      --muted: #8888AA;
      --green: #2ECC71;
      --green-bg: #0D2818;
      --highlight: #FFD60A;
      --highlight-bg: #2A2200;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 40px 20px 32px;
      position: relative;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1px;
      color: #fff;
    }
    header h1 span { color: var(--orange); }
    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .save-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 12px;
      transition: color .3s;
    }
    .save-status.saved { color: var(--green); }
    .save-status.syncing { color: var(--orange); }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .toolbar button {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all .2s;
    }
    .toolbar button:hover { border-color: var(--orange); color: var(--orange); }
    .toolbar button.primary {
      background: var(--orange);
      border-color: var(--orange);
      color: #fff;
      font-weight: 600;
    }
    .toolbar button.primary:hover { opacity: .88; }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
      font-size: 0.82rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .badge-meta { background: var(--highlight); color: #1A1A00; padding: 1px 8px; border-radius: 10px; font-weight: 700; font-size: 0.75rem; }
    .badge-done { background: var(--green-bg); color: var(--green); padding: 1px 8px; border-radius: 10px; font-size: 0.75rem; }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 24px #0006; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .card-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .card-title {
      font-weight: 700;
      font-size: 0.95rem;
      flex: 1;
    }
    .card-tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 600;
    }

    /* ── ITEMS LIST ── */
    .items-list {
      padding: 14px 16px;
      list-style: none;
      min-height: 60px;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 10px;
      margin-bottom: 4px;
      transition: background .15s;
      position: relative;
    }
    .item:hover { background: #ffffff08; }

    /* meta highlight */
    .item.meta {
      background: var(--highlight-bg);
      border: 1px solid #FFD60A44;
    }
    .item.meta .item-text { color: var(--highlight); }

    /* done */
    .item.done .item-text {
      text-decoration: line-through;
      color: var(--muted);
      opacity: .6;
    }

    .item-check {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      transition: all .15s;
    }
    .item.done .item-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .item-text {
      flex: 1;
      font-size: 0.88rem;
      line-height: 1.45;
      outline: none;
      min-height: 20px;
      cursor: text;
      color: var(--text);
    }
    .item-text:focus {
      color: #fff;
    }
    .item-text:empty::before {
      content: 'Escreva aqui...';
      color: var(--muted);
      pointer-events: none;
    }

    .item-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .item:hover .item-actions { opacity: 1; }

    .btn-icon {
      width: 24px; height: 24px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      transition: all .15s;
    }
    .btn-icon:hover { background: #ffffff15; color: #fff; }
    .btn-icon.star:hover { color: var(--highlight); }
    .btn-icon.del:hover { color: #ff5555; }
    .btn-icon.notes:hover { color: #60a5fa; }
    .btn-icon.notes.has-notes { color: #60a5fa; opacity: 1 !important; }

    /* ── NOTES DOT ── */
    .notes-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #60a5fa;
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000088;
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 520px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 60px #0008;
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .modal-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-item-name {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.4;
    }
    .modal-close {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
    }
    .modal-close:hover { background: #ffffff15; color: #fff; }
    .modal-notes {
      width: 100%;
      min-height: 160px;
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      color: var(--text);
      font-size: 0.9rem;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .modal-notes:focus { border-color: var(--orange); }
    .modal-notes::placeholder { color: var(--muted); }
    .modal-footer {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: right;
    }
    .modal-footer.saved { color: var(--green); }

    /* ── ADD ITEM ── */
    .add-item-row {
      padding: 4px 16px 14px;
    }
    .add-item-btn {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      text-align: left;
      transition: all .15s;
    }
    .add-item-btn:hover {
      border-color: var(--orange);
      color: var(--orange);
      background: var(--orange-glow);
    }

    /* ── CARD COLORS ── */
    .c-orange .card-icon { background: #FF6B3520; color: var(--orange); }
    .c-orange .card-tag { background: #FF6B3520; color: var(--orange); }
    .c-orange .card-header { border-bottom-color: #FF6B3520; }

    .c-blue .card-icon { background: #3B82F620; color: #3B82F6; }
    .c-blue .card-tag { background: #3B82F620; color: #3B82F6; }

    .c-purple .card-icon { background: #A855F720; color: #A855F7; }
    .c-purple .card-tag { background: #A855F720; color: #A855F7; }

    .c-teal .card-icon { background: #14B8A620; color: #14B8A6; }
    .c-teal .card-tag { background: #14B8A620; color: #14B8A6; }

    .c-pink .card-icon { background: #EC489920; color: #EC4899; }
    .c-pink .card-tag { background: #EC489920; color: #EC4899; }

    .c-green .card-icon { background: #22C55E20; color: #22C55E; }
    .c-green .card-tag { background: #22C55E20; color: #22C55E; }

    .c-yellow .card-icon { background: #EAB30820; color: #EAB308; }
    .c-yellow .card-tag { background: #EAB30820; color: #EAB308; }

    .c-red .card-icon { background: #EF444420; color: #EF4444; }
    .c-red .card-tag { background: #EF444420; color: #EF4444; }

    /* ── NOTES AREA ── */
    .notes-section {
      max-width: 1300px;
      margin: 28px auto 0;
    }
    .notes-label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .notes-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-height: 90px;
      outline: none;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
    }
    .notes-box:focus { border-color: var(--orange); }
    .notes-box:empty::before {
      content: 'Recados gerais para o chefe, links importantes, contextos extras...';
      color: var(--muted);
      pointer-events: none;
    }

    /* ── RESPONSIVE ── */
    @media(max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── PRINT ── */
    @media print {
      body { background: #fff; color: #111; }
      .toolbar, .add-item-btn, .item-actions, .btn-icon { display: none !important; }
      .card { border: 1px solid #ccc; break-inside: avoid; }
    }
  </style>
</head>
<body>

<!-- ── MODAL DE OBSERVAÇÕES ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">📝 Observações</div>
        <div class="modal-item-name" id="modalItemName"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <textarea class="modal-notes" id="modalNotes" placeholder="Adicione observações, links, contexto..."></textarea>
    <div class="modal-footer" id="modalFooter">Esc para fechar · salvo automaticamente</div>
  </div>
</div>

<header>
  <h1>🌴 Férias <span>Mari</span></h1>
  <p>Clique em qualquer texto para editar · ⭐ destaca meta de abril · ✓ marca como feito</p>
  <div class="save-status" id="saveStatus">
    <span class="dot"></span> <span id="saveText">Pronto para editar</span>
  </div>
</header>

<div class="toolbar">
  <button class="primary" onclick="saveAll()">💾 Salvar tudo</button>
  <button onclick="expandAll()">↕ Expandir todas</button>
  <button onclick="clearStorage()">🗑 Resetar dados</button>
  <button onclick="window.print()">🖨 Imprimir</button>
</div>

<div class="legend">
  <span><span class="badge-meta">⭐ META ABR</span> Impacta meta de abril</span>
  <span><span class="badge-done">✓ feito</span> Concluído</span>
  <span>· Clique no texto para editar · Enter = nova linha</span>
</div>

<div class="grid" id="grid"></div>

<div class="notes-section">
  <div class="notes-label">📝 Recados gerais</div>
  <div class="notes-box" id="generalNotes" contenteditable="true" spellcheck="false"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    id: 'growth-organico',
    color: 'c-orange',
    icon: '🌱',
    title: 'Growth',
    tag: 'Mídia Não Paga',
    items: [
      { text: 'SEO: auditorias e otimizações em andamento', meta: false, done: false },
      { text: 'Blog: calendário editorial do mês', meta: false, done: false },
      { text: 'Parcerias orgânicas / co-marketing', meta: false, done: false },
      { text: 'CRO: testes A/B ativos', meta: false, done: false },
    ]
  },
  {
    id: 'growth-pago',
    color: 'c-blue',
    icon: '📈',
    title: 'Growth',
    tag: 'Mídia Paga',
    items: [
      { text: 'Meta Ads: campanhas ativas e orçamentos', meta: false, done: false },
      { text: 'Google Ads: palavras-chave e lances', meta: false, done: false },
      { text: 'Relatório de performance semanal', meta: false, done: false },
      { text: 'Criativos para aprovação / subida', meta: false, done: false },
    ]
  },
  {
    id: 'ativacao',
    color: 'c-purple',
    icon: '⚡',
    title: 'Mkt de Ativação',
    tag: 'Ativação',
    items: [
      { text: 'Campanhas de ativação de leads frios', meta: false, done: false },
      { text: 'Fluxos de e-mail / WhatsApp ativos', meta: false, done: false },
      { text: 'Segmentações e listas em revisão', meta: false, done: false },
      { text: 'Relatório de conversão de ativação', meta: false, done: false },
    ]
  },
  {
    id: 'midias-sociais',
    color: 'c-pink',
    icon: '📱',
    title: 'Mídias Sociais',
    tag: 'Social',
    items: [
      { text: 'Calendário de posts agendados', meta: false, done: false },
      { text: 'Stories e Reels em produção', meta: false, done: false },
      { text: 'Resposta a comentários / DMs', meta: false, done: false },
      { text: 'Relatório de engajamento mensal', meta: false, done: false },
    ]
  },
  {
    id: 'ia-mktplace',
    color: 'c-teal',
    icon: '🤖',
    title: 'IA Creator',
    tag: 'Mkt Place',
    items: [
      { text: 'Agentes em produção / status', meta: false, done: false },
      { text: 'Próximos entregáveis do marketplace', meta: false, done: false },
      { text: 'Integrações pendentes', meta: false, done: false },
      { text: 'Backlog de melhorias', meta: false, done: false },
    ]
  },
  {
    id: 'ia-szs',
    color: 'c-green',
    icon: '🏠',
    title: 'IA Creator',
    tag: 'SZS',
    items: [
      { text: 'Status dos agentes SZS', meta: false, done: false },
      { text: 'Pendências de conteúdo / aprovação', meta: false, done: false },
      { text: 'Próximas entregas SZS', meta: false, done: false },
      { text: 'Bugs ou ajustes abertos', meta: false, done: false },
    ]
  },
  {
    id: 'ia-szi',
    color: 'c-yellow',
    icon: '💡',
    title: 'IA Creator',
    tag: 'SZI',
    items: [
      { text: 'Status dos agentes SZI', meta: false, done: false },
      { text: 'Pendências de conteúdo / aprovação', meta: false, done: false },
      { text: 'Próximas entregas SZI', meta: false, done: false },
      { text: 'Bugs ou ajustes abertos', meta: false, done: false },
    ]
  },
  {
    id: 'vistas-anita',
    color: 'c-red',
    icon: '🌅',
    title: 'Vistas de Anitá',
    tag: 'Vistas',
    items: [
      { text: 'Ações de marketing para o projeto', meta: false, done: false },
      { text: 'Comunicação e materiais ativos', meta: false, done: false },
      { text: 'Próximos marcos do lançamento', meta: false, done: false },
      { text: 'Pendências com o time', meta: false, done: false },
    ]
  }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {};
let isSyncing = false;

async function loadState() {
  setSaveStatus('syncing', '☁️ Carregando...');
  try {
    const resp = await fetch('/api/state');
    if (resp.ok) {
      const data = await resp.json();
      if (data && Object.keys(data).length > 0) {
        state = data;
        setSaveStatus('saved', 'Sincronizado ✓');
        setTimeout(() => setSaveStatus('idle', 'Pronto para editar'), 2000);
        return;
      }
    }
  } catch(e) {}
  // fallback to localStorage
  try {
    const raw = localStorage.getItem('ferias-mari-v2');
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  setSaveStatus('idle', 'Pronto para editar');
}

function setSaveStatus(type, text) {
  const el = document.getElementById('saveStatus');
  const txt = document.getElementById('saveText');
  el.classList.remove('saved', 'syncing');
  if (type === 'saved') el.classList.add('saved');
  if (type === 'syncing') el.classList.add('syncing');
  txt.textContent = text;
}

async function saveState() {
  // always save to localStorage as cache
  localStorage.setItem('ferias-mari-v2', JSON.stringify(state));
  if (isSyncing) return;
  isSyncing = true;
  setSaveStatus('syncing', '☁️ Salvando...');
  try {
    const resp = await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state),
    });
    if (resp.ok) {
      setSaveStatus('saved', 'Salvo na nuvem ✓ ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}));
      setTimeout(() => setSaveStatus('idle', 'Pronto para editar'), 2500);
    } else {
      setSaveStatus('idle', 'Salvo localmente');
    }
  } catch(e) {
    setSaveStatus('idle', 'Salvo localmente');
  } finally {
    isSyncing = false;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function getSection(id) {
  if (!state[id]) {
    const def = SECTIONS.find(s => s.id === id);
    state[id] = { items: JSON.parse(JSON.stringify(def.items)) };
  }
  return state[id];
}

function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  SECTIONS.forEach(sec => {
    grid.appendChild(buildCard(sec));
  });
  // notes
  const notes = document.getElementById('generalNotes');
  notes.textContent = state._notes || '';
  notes.addEventListener('input', () => { state._notes = notes.textContent; autoSave(); });
}

function buildCard(sec) {
  const data = getSection(sec.id);

  const card = document.createElement('div');
  card.className = `card ${sec.color}`;
  card.id = `card-${sec.id}`;

  // header
  const hdr = document.createElement('div');
  hdr.className = 'card-header';
  hdr.innerHTML = `
    <div class="card-icon">${sec.icon}</div>
    <div>
      <div class="card-title">${sec.title}</div>
    </div>
    <div class="card-tag">${sec.tag}</div>
  `;
  card.appendChild(hdr);

  // list
  const list = document.createElement('ul');
  list.className = 'items-list';
  list.id = `list-${sec.id}`;
  data.items.forEach((item, idx) => {
    list.appendChild(buildItem(sec.id, idx, item));
  });
  card.appendChild(list);

  // add button
  const addRow = document.createElement('div');
  addRow.className = 'add-item-row';
  const addBtn = document.createElement('button');
  addBtn.className = 'add-item-btn';
  addBtn.textContent = '+ Adicionar item';
  addBtn.onclick = () => addItem(sec.id);
  addRow.appendChild(addBtn);
  card.appendChild(addRow);

  return card;
}

function buildItem(secId, idx, item) {
  const li = document.createElement('li');
  li.className = 'item' + (item.meta ? ' meta' : '') + (item.done ? ' done' : '');
  li.dataset.idx = idx;

  // check
  const chk = document.createElement('div');
  chk.className = 'item-check';
  chk.title = 'Marcar como feito';
  if (item.done) chk.textContent = '✓';
  chk.onclick = () => toggleDone(secId, idx);

  // text
  const txt = document.createElement('div');
  txt.className = 'item-text';
  txt.contentEditable = 'true';
  txt.spellcheck = false;
  txt.textContent = item.text;
  txt.addEventListener('input', () => {
    state[secId].items[idx].text = txt.textContent;
    autoSave();
  });
  txt.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      addItemAfter(secId, idx);
    }
    if (e.key === 'Backspace' && txt.textContent === '') {
      e.preventDefault();
      removeItem(secId, idx);
    }
  });

  // actions
  const acts = document.createElement('div');
  acts.className = 'item-actions';

  const starBtn = document.createElement('button');
  starBtn.className = 'btn-icon star';
  starBtn.title = 'Destacar como meta de abril';
  starBtn.textContent = item.meta ? '⭐' : '☆';
  starBtn.onclick = () => toggleMeta(secId, idx);

  const notesBtn = document.createElement('button');
  const hasNotes = !!(item.notes && item.notes.trim());
  notesBtn.className = 'btn-icon notes' + (hasNotes ? ' has-notes' : '');
  notesBtn.title = 'Ver / editar observações';
  notesBtn.textContent = '📝';
  notesBtn.onclick = (e) => { e.stopPropagation(); openModal(secId, idx); };

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-icon del';
  delBtn.title = 'Remover';
  delBtn.textContent = '✕';
  delBtn.onclick = () => removeItem(secId, idx);

  acts.appendChild(notesBtn);
  acts.appendChild(starBtn);
  acts.appendChild(delBtn);

  // dot indicator if has notes
  if (hasNotes) {
    const dot = document.createElement('div');
    dot.className = 'notes-dot';
    li.appendChild(chk);
    li.appendChild(txt);
    li.appendChild(dot);
    li.appendChild(acts);
  } else {
    li.appendChild(chk);
    li.appendChild(txt);
    li.appendChild(acts);
  }

  return li;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleMeta(secId, idx) {
  state[secId].items[idx].meta = !state[secId].items[idx].meta;
  refreshList(secId);
  autoSave();
}

function toggleDone(secId, idx) {
  state[secId].items[idx].done = !state[secId].items[idx].done;
  refreshList(secId);
  autoSave();
}

function addItem(secId) {
  state[secId].items.push({ text: '', meta: false, done: false });
  refreshList(secId);
  autoSave();
  // focus new item
  const list = document.getElementById(`list-${secId}`);
  const last = list.querySelector('.item:last-child .item-text');
  if (last) { last.focus(); }
}

function addItemAfter(secId, idx) {
  state[secId].items.splice(idx + 1, 0, { text: '', meta: false, done: false });
  refreshList(secId);
  autoSave();
  const list = document.getElementById(`list-${secId}`);
  const items = list.querySelectorAll('.item-text');
  if (items[idx + 1]) items[idx + 1].focus();
}

function removeItem(secId, idx) {
  state[secId].items.splice(idx, 1);
  refreshList(secId);
  autoSave();
}

function refreshList(secId) {
  const list = document.getElementById(`list-${secId}`);
  if (!list) return;
  list.innerHTML = '';
  state[secId].items.forEach((item, idx) => {
    list.appendChild(buildItem(secId, idx, item));
  });
}

// ── AUTO SAVE (debounced) ─────────────────────────────────────────────────────
let saveTimer;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAll, 800);
}

function saveAll() {
  // collect all text content before saving
  SECTIONS.forEach(sec => {
    const list = document.getElementById(`list-${sec.id}`);
    if (!list) return;
    list.querySelectorAll('.item').forEach((li, idx) => {
      const txt = li.querySelector('.item-text');
      if (txt && state[sec.id] && state[sec.id].items[idx]) {
        state[sec.id].items[idx].text = txt.textContent;
      }
    });
  });
  state._notes = document.getElementById('generalNotes').textContent;
  saveState();
}

function expandAll() {
  SECTIONS.forEach(sec => {
    if (!state[sec.id]) getSection(sec.id);
  });
  renderAll();
}

async function clearStorage() {
  if (!confirm('Resetar todos os dados para todos? Isso apaga tudo na nuvem.')) return;
  localStorage.removeItem('ferias-mari-v2');
  state = {};
  renderAll();
  await fetch('/api/state', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({}),
  });
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
let modalCtx = null;
let modalSaveTimer;

function openModal(secId, idx) {
  const item = state[secId].items[idx];
  modalCtx = { secId, idx };
  document.getElementById('modalItemName').textContent = item.text || '(sem título)';
  const ta = document.getElementById('modalNotes');
  ta.value = item.notes || '';
  document.getElementById('modalFooter').textContent = 'Esc para fechar · salvo automaticamente';
  document.getElementById('modalFooter').classList.remove('saved');
  document.getElementById('modalOverlay').classList.add('open');
  ta.focus();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  modalCtx = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('modalOverlay').classList.remove('open');
    modalCtx = null;
  }
});

document.getElementById('modalNotes').addEventListener('input', () => {
  if (!modalCtx) return;
  const { secId, idx } = modalCtx;
  state[secId].items[idx].notes = document.getElementById('modalNotes').value;
  clearTimeout(modalSaveTimer);
  modalSaveTimer = setTimeout(() => {
    autoSave();
    const footer = document.getElementById('modalFooter');
    footer.textContent = 'Salvo ✓';
    footer.classList.add('saved');
    setTimeout(() => {
      footer.textContent = 'Esc para fechar · salvo automaticamente';
      footer.classList.remove('saved');
    }, 1500);
    // refresh dot indicator on the item
    refreshList(secId);
  }, 600);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadState();
  SECTIONS.forEach(sec => getSection(sec.id));
  renderAll();
})();
</script>
</body>
</html>
